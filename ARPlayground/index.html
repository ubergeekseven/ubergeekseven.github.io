  
<!doctype HTML>
<html>
    <head>
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    </head>
    <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/jeromeetienne/AR.js/master/aframe/build/aframe-ar.min.js"></script>
    <script src="https://raw.githack.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>

    <body style='margin : 0px; overflow: hidden;'>
        <!-- we add detectionMode and matrixCodeType to tell AR.js to recognize barcode markers -->
        <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;'>

        <a-assets>
            <a-asset-item id="animated-asset" src="https://raw.githubusercontent.com/ubergeekseven/ubergeekseven.github.io/master/ARPlayground/Assets/models/CesiumMan1.gltf"></a-asset-item>
            <a-asset-item id="animated-asset-2" src="https://raw.githubusercontent.com/ubergeekseven/ubergeekseven.github.io/master/ARPlayground/Assets/models/scene.gltf"></a-asset-item>
        </a-assets>

        <a-marker id="animated-marker-2" type='barcode' value='7'>
          <a-video 
            src="./Assets/Mp4/Agua-natural.mp4" 
            smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2"
            
            rotation="-90 -0 0"
            width="16" height="9" position="0 0 10"
            >
          </a-video>
        </a-marker>

        <a-marker id="animated-marker" type='barcode' value='6'>
            <a-entity
                gltf-model="#animated-asset"
                scale="2">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
        </a-scene>
    </body>
</html>
